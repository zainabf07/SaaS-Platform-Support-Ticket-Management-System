<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}TMS{% endblock %} — TicketDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0e13;
  --surface: #13161e;
  --surface2: #1a1e28;
  --border: #252a38;
  --accent: #4f6ef7;
  --accent2: #7c3aed;
  --text: #e8eaf0;
  --muted: #6b7280;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; }

/* SIDEBAR */
.sidebar {
  width: 240px; min-height:100vh; background:var(--surface);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
  padding:0; position:fixed; top:0; left:0; height:100vh; z-index:100;
}
.sidebar-logo {
  padding:28px 24px 20px; border-bottom:1px solid var(--border);
  font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem;
  letter-spacing:-0.5px; color:var(--text);
}
.sidebar-logo span { color:var(--accent); }
.sidebar-section { padding:16px 12px 8px; font-size:0.65rem; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--muted); font-weight:600; }
.sidebar nav { flex:1; padding:0 12px; }
.nav-link {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:8px; color:var(--muted); text-decoration:none;
  font-size:0.875rem; font-weight:500; margin-bottom:2px;
  transition:all 0.15s;
}
.nav-link:hover { background:var(--surface2); color:var(--text); }
.nav-link.active { background:linear-gradient(135deg,rgba(79,110,247,0.2),rgba(124,58,237,0.15));
  color:var(--accent); border:1px solid rgba(79,110,247,0.25); }
.nav-link svg { width:16px; height:16px; flex-shrink:0; }
.sidebar-user {
  padding:16px; border-top:1px solid var(--border); margin-top:auto;
  display:flex; align-items:center; gap:10px;
}
.avatar {
  width:34px; height:34px; border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem; color:#fff;
  flex-shrink:0;
}
.user-info .user-name { font-size:0.8rem; font-weight:600; color:var(--text); }
.user-info .user-role { font-size:0.7rem; color:var(--muted); }
.logout-btn {
  margin-left:auto; color:var(--muted); text-decoration:none; font-size:0.75rem;
  padding:4px 8px; border-radius:4px; border:1px solid var(--border);
  transition:all 0.15s;
}
.logout-btn:hover { color:var(--red); border-color:var(--red); }

/* MAIN */
.main { margin-left:240px; flex:1; min-height:100vh; }
.topbar {
  padding:20px 32px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface); position:sticky; top:0; z-index:50;
}
.page-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1.3rem; }
.page-subtitle { font-size:0.8rem; color:var(--muted); margin-top:2px; }
.content { padding:32px; }

/* CARDS */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:24px;
}
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:20px; position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.stat-card.blue::before { background:var(--accent); }
.stat-card.purple::before { background:var(--accent2); }
.stat-card.green::before { background:var(--green); }
.stat-card.yellow::before { background:var(--yellow); }
.stat-label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.stat-value { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; }
.stat-card.blue .stat-value { color:var(--accent); }
.stat-card.purple .stat-value { color:var(--accent2); }
.stat-card.green .stat-value { color:var(--green); }
.stat-card.yellow .stat-value { color:var(--yellow); }

/* TABLE */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead tr { border-bottom:1px solid var(--border); }
th { padding:10px 14px; text-align:left; font-size:0.7rem; text-transform:uppercase;
  letter-spacing:1px; color:var(--muted); font-weight:600; }
tbody tr { border-bottom:1px solid rgba(37,42,56,0.6); transition:background 0.1s; }
tbody tr:hover { background:var(--surface2); }
td { padding:12px 14px; font-size:0.875rem; }

/* BADGES */
.badge {
  display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px;
  font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
}
.badge-new { background:rgba(79,110,247,0.15); color:var(--accent); border:1px solid rgba(79,110,247,0.3); }
.badge-assigned { background:rgba(245,158,11,0.15); color:var(--yellow); border:1px solid rgba(245,158,11,0.3); }
.badge-progress { background:rgba(124,58,237,0.15); color:#a78bfa; border:1px solid rgba(124,58,237,0.3); }
.badge-resolved { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.3); }
.badge-closed { background:rgba(107,114,128,0.15); color:var(--muted); border:1px solid rgba(107,114,128,0.3); }
.badge-high { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
.badge-medium { background:rgba(245,158,11,0.15); color:var(--yellow); border:1px solid rgba(245,158,11,0.3); }
.badge-low { background:rgba(16,185,129,0.15); color:var(--green); border:1px solid rgba(16,185,129,0.3); }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:7px; padding:9px 18px;
  border-radius:8px; font-size:0.85rem; font-weight:500; cursor:pointer;
  text-decoration:none; border:none; transition:all 0.15s; font-family:inherit;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#3d5ce6; }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--text); }
.btn-sm { padding:6px 12px; font-size:0.78rem; }

/* FORMS */
.form-group { margin-bottom:18px; }
label { display:block; font-size:0.8rem; font-weight:500; color:var(--muted);
  margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
input, textarea, select {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px; color:var(--text); font-family:inherit;
  font-size:0.9rem; outline:none; transition:border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:100px; }
select option { background:var(--surface2); }

/* FLASH */
.flash { padding:12px 16px; border-radius:8px; margin-bottom:20px;
  background:rgba(79,110,247,0.15); border:1px solid rgba(79,110,247,0.3);
  color:var(--accent); font-size:0.875rem; }

/* TICKET LINK */
.ticket-link { color:var(--text); text-decoration:none; font-weight:500; }
.ticket-link:hover { color:var(--accent); }
.ticket-id { color:var(--muted); font-size:0.75rem; font-family:monospace; }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

{% if session.user_id %}
<aside class="sidebar">
  <div class="sidebar-logo">Ticket<span>Desk</span></div>
  <nav>
    <div class="sidebar-section">Main</div>
    <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
      Dashboard
    </a>
    <a href="/tickets" class="nav-link {% if '/tickets' in request.path %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Tickets
    </a>
    <a href="/users" class="nav-link {% if request.path=='/users' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.768-.231-1.48-.634-2.057M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.768.231-1.48.634-2.057m0 0a5.002 5.002 0 019.732 0"/></svg>
      Users
    </a>
  </nav>
  <div class="sidebar-user">
    <div class="avatar">{{ session.name[0] }}</div>
    <div class="user-info">
      <div class="user-name">{{ session.name }}</div>
      <div class="user-role">{{ session.role }}</div>
    </div>
    <a href="/logout" class="logout-btn">Out</a>
  </div>
</aside>
{% endif %}

<main class="main" {% if not session.user_id %}style="margin-left:0"{% endif %}>
  {% block content %}{% endblock %}
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — TicketDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0c0e13; --surface:#13161e; --surface2:#1a1e28;
  --border:#252a38; --accent:#4f6ef7; --accent2:#7c3aed;
  --text:#e8eaf0; --muted:#6b7280; --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg-glow{
  position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(79,110,247,0.12) 0%,transparent 70%);
  top:-100px;left:-100px;pointer-events:none;
}
.bg-glow2{
  position:fixed;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.1) 0%,transparent 70%);
  bottom:-50px;right:-50px;pointer-events:none;
}
.login-wrap{
  width:100%;max-width:420px;padding:20px;position:relative;z-index:1;
}
.logo{
  text-align:center;margin-bottom:40px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;
  letter-spacing:-1px;
}
.logo span{color:var(--accent);}
.logo-sub{font-size:0.85rem;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-weight:400;margin-top:4px;}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:36px;
}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:6px;}
.sub{font-size:0.85rem;color:var(--muted);margin-bottom:28px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;}
input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:11px 14px;color:var(--text);font-family:inherit;
  font-size:0.9rem;outline:none;transition:border-color 0.15s;
}
input:focus{border-color:var(--accent);}
.btn{
  width:100%;padding:12px;background:var(--accent);color:#fff;
  border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;
  font-size:0.95rem;cursor:pointer;transition:background 0.15s;margin-top:8px;
}
.btn:hover{background:#3d5ce6;}
.error{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:18px;
}
.hint{
  margin-top:20px;padding:14px;background:var(--surface2);
  border-radius:8px;font-size:0.8rem;color:var(--muted);
  border:1px solid var(--border);
}
.hint strong{color:var(--text);display:block;margin-bottom:6px;}
.hint-row{display:flex;justify-content:space-between;padding:2px 0;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-wrap">
  <div class="logo">Ticket<span>Desk</span><div class="logo-sub">Support Ticket Management</div></div>
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in with your email to continue</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="hint">
      <strong>Demo Accounts</strong>
      <div class="hint-row"><span>Admin:</span><span>admin@example.com</span></div>
      <div class="hint-row"><span>Agent:</span><span>usman@example.com</span></div>
      <div class="hint-row"><span>Customer:</span><span>ali@example.com</span></div>
    </div>
  </div>
</div>
</body>
</html>
